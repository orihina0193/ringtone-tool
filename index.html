<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Ringtone Ignition v1.5.9</title>
<style>
  html { -webkit-text-size-adjust: 100%; }
  body { background:#121212; color:#eee; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; }
  
  .panel { background:#1e1e1e; border:1px solid #333; padding:15px; border-radius:16px; width:92%; max-width:400px; text-align:center; box-sizing:border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  
  .time { font-size:2.8rem; color:#0ff; font-weight:bold; margin:10px 0; text-shadow:0 0 15px rgba(0,255,255,0.5); font-variant-numeric: tabular-nums; }
  
  .info-area { margin-bottom:15px; min-height:3.5em; }
  .range-info { font-size:0.9rem; color:#f0f; font-weight:bold; opacity:0.9; }
  .alert-info { font-size:0.8rem; color:#ff4444; font-weight:bold; margin-top:5px; height:1.2em; }
  
  input[type=range] { width:100%; margin:15px 0; accent-color:#0ff; cursor:pointer; }
  
  .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
  
  button { 
    background:#2a2a2a; color:#fff; border:1px solid #444; 
    border-radius:10px; font-weight:bold; font-size:14px; 
    cursor:pointer; -webkit-tap-highlight-color:transparent;
    transition: all 0.1s; display: flex; align-items: center; justify-content: center;
    min-height: 48px; width: 100%;
  }
  button:active { transform: scale(0.97); background:#444; }

  .ctrl-box { display: flex; flex-direction: column; gap: 6px; }
  .adj-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .adj-pair button { min-height: 40px; font-size: 11px; }

  .accent-in { color:#f0f; border-color:rgba(255,0,255,0.5); background: rgba(255, 0, 255, 0.05); }
  .accent-out { color:#0ff; border-color:rgba(0,255,255,0.5); background: rgba(0, 255, 255, 0.05); }
  
  .full-width { grid-column: span 2; }
  .play-btn { background: #333; border-color: #555; height: 52px; font-size: 16px; }
  .jump-btn { min-height: 42px; font-size: 13px; margin-top: 2px; }

  .main { background: linear-gradient(135deg, #006666, #004444); color:#fff; border:1px solid #0ff; font-size:18px; height:60px; margin-top:15px; box-shadow: 0 0 15px rgba(0,255,255,0.2); }
  .main:disabled { background:#222; color:#555; border-color:#333; box-shadow:none; }
  
  .fade-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px; width: 100%; }
  .f-btn { font-size: 11px; min-height: 36px; color: #888; }
  .f-btn.active { background:#444; color:#fff; border-color:#eee; }
  
  #file-in { display:none; }
</style>
</head>
<body onclick="unlockAudio()">
  <div class="panel">
    <!-- ファイル選択ボタンのonclickを修正 -->
    <button onclick="unlockAudio(); document.getElementById('file-in').click()" style="height:48px; background:#333; color:#0ff; border-color:#0ff; margin-bottom:10px;">🎵 SELECT MUSIC</button>
    
    <div id="tm" class="time">00:00.00</div>
    
    <div class="info-area">
      <div id="range-val" class="range-info">SELECT FILE...</div>
      <div id="alert-msg" class="alert-info"></div>
    </div>

    <input type="range" id="sk" value="0" step="0.01" oninput="manualSeek(this.value)">
    
    <div class="grid-layout">
      <button onclick="skip(-1)">-1s</button>
      <button onclick="skip(1)">+1s</button>
      <button class="full-width play-btn" onclick="pp()">PLAY / STOP</button>
      
      <div class="ctrl-box">
        <button class="accent-in" onclick="st('s')">SET START</button>
        <div class="adj-pair">
          <button class="accent-in" onclick="adj('s',-0.1)">-0.1</button>
          <button class="accent-in" onclick="adj('s',0.1)">+0.1</button>
        </div>
        <button class="accent-in jump-btn" onclick="backToStart()">⏮ STARTへ</button>
      </div>
      
      <div class="ctrl-box">
        <button class="accent-out" onclick="st('e')">SET END</button>
        <div class="adj-pair">
          <button class="accent-out" onclick="adj('e',-0.1)">-0.1</button>
          <button class="accent-out" onclick="adj('e',0.1)">+0.1</button>
        </div>
        <button class="accent-out jump-btn" onclick="previewEnd()">⏭ END直前</button>
      </div>

      <div class="fade-group full-width">
        <button class="f-btn active" id="f0" onclick="setFade(0)">FADE OFF</button>
        <button class="f-btn" id="f2" onclick="setFade(2)">2s FADE</button>
        <button class="f-btn" id="f5" onclick="setFade(5)">5s FADE</button>
      </div>
      
      <button id="ig" class="main full-width" onclick="exportAudio()">IGNITION</button>
    </div>
  </div>
  <!-- 確実に読み込むためのinputタグ -->
  <input type="file" id="file-in" accept="audio/*" onchange="loadFile(event)">

<script>
  let aCtx = new (window.AudioContext || window.webkitAudioContext)();
  let aBuf, sNode, gNode;
  let sT = 0, eT = 0, fade = 0, isP = false, pStart = 0, offset = 0;
  const sk = document.getElementById('sk');

  function unlockAudio() { if (aCtx.state === 'suspended') aCtx.resume(); }

  // ファイル読み込み処理
  async function loadFile(e) {
    const file = e.target.files[0];
    if(!file) return;
    document.getElementById('range-val').innerText = "DECODING...";
    try {
      const arrayBuffer = await file.arrayBuffer();
      const decoded = await aCtx.decodeAudioData(arrayBuffer);
      const monoBuf = aCtx.createBuffer(1, decoded.length, decoded.sampleRate);
      const monoData = monoBuf.getChannelData(0);
      if (decoded.numberOfChannels > 1) {
        const left = decoded.getChannelData(0), right = decoded.getChannelData(1);
        for (let i = 0; i < decoded.length; i++) monoData[i] = (left[i] + right[i]) / 2;
      } else { monoData.set(decoded.getChannelData(0)); }
      aBuf = monoBuf;
      sk.max = aBuf.duration;
      sT = 0; eT = aBuf.duration; offset = 0;
      updateInfo();
    } catch (err) { 
      document.getElementById('range-val').innerText = "ERROR: LOAD FAILED"; 
    }
  }

  function stopAudio() {
    if (sNode) {
      if (isP) offset = aCtx.currentTime - pStart + offset;
      try { sNode.stop(); } catch(e){}
      sNode.disconnect();
      if(gNode) gNode.disconnect();
      sNode = null; gNode = null;
    }
    isP = false;
  }

  function pp() {
    if (!aBuf) return;
    unlockAudio();
    if (isP) { stopAudio(); } else {
      if (sNode) { sNode.disconnect(); sNode = null; }
      sNode = aCtx.createBufferSource();
      sNode.buffer = aBuf;
      gNode = aCtx.createGain();
      sNode.connect(gNode); gNode.connect(aCtx.destination);
      if (offset >= eT || offset < 0) offset = sT;
      pStart = aCtx.currentTime;
      const remainingTime = eT - offset;
      if (fade > 0 && remainingTime > 0) {
        const fStart = Math.max(0, remainingTime - fade);
        gNode.gain.setValueAtTime(1, pStart);
        gNode.gain.setValueAtTime(1, pStart + fStart);
        gNode.gain.linearRampToValueAtTime(0, pStart + remainingTime);
      }
      sNode.start(0, offset, Math.max(0, remainingTime));
      isP = true;
      const tick = () => {
        if (!isP) return;
        let now = aCtx.currentTime - pStart + offset;
        updateTimeDisplay(now);
        if (now >= eT) { isP = false; stopAudio(); offset = sT; updateTimeDisplay(sT); } else { requestAnimationFrame(tick); }
      };
      tick();
    }
  }

  function manualSeek(v) { stopAudio(); offset = parseFloat(v); updateTimeDisplay(offset); }
  function skip(v) { if(!aBuf) return; let wasP = isP; stopAudio(); offset = Math.min(aBuf.duration, Math.max(0, offset + v)); updateTimeDisplay(offset); if (wasP) pp(); }
  function adj(t, v) { if(!aBuf) return; if(t == 's') sT = Math.max(0, sT + v); else eT = Math.min(aBuf.duration, eT + v); updateInfo(); }
  function st(t) { if(!aBuf) return; let now = isP ? aCtx.currentTime - pStart + offset : offset; if(t=='s') sT = now; else eT = now; updateInfo(); }
  function backToStart() { stopAudio(); offset = sT; updateTimeDisplay(sT); }
  function previewEnd() { stopAudio(); offset = Math.max(sT, eT - 3); pp(); }
  function setFade(v) { fade = v; document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active')); document.getElementById('f'+v).classList.add('active'); if (isP) { let c = aCtx.currentTime - pStart + offset; stopAudio(); offset = c; pp(); } }

  function updateInfo() { 
    if(!aBuf) return;
    const editLen = eT - sT;
    const rangeVal = document.getElementById('range-val');
    const alertMsg = document.getElementById('alert-msg');
    const ignition = document.getElementById('ig');
    rangeVal.innerText = "IN: " + sT.toFixed(2) + "s / OUT: " + eT.toFixed(2) + "s (" + editLen.toFixed(2) + "s)";
    if (editLen > 40) {
      alertMsg.innerText = "⚠️ TOO LONG (MAX 40s)";
      ignition.disabled = true;
    } else {
      alertMsg.innerText = "";
      ignition.disabled = false;
    }
    updateTimeDisplay(isP ? aCtx.currentTime - pStart + offset : offset); 
  }

  function updateTimeDisplay(t) { 
    let m = Math.floor(t/60), s = (t%60).toFixed(2); 
    document.getElementById('tm').innerText = m+":"+s.padStart(5,'0'); 
    sk.value = t; 
  }

  async function exportAudio() {
    if (!aBuf) return;
    const dur = eT - sT;
    const sRate = aBuf.sampleRate;
    const oCtx = new OfflineAudioContext(1, Math.floor(dur * sRate), sRate);
    const src = oCtx.createBufferSource(); src.buffer = aBuf;
    const gain = oCtx.createGain();
    gain.gain.setValueAtTime(1, 0);
    if (fade > 0) { gain.gain.setValueAtTime(1, Math.max(0, dur - fade)); gain.gain.linearRampToValueAtTime(0, dur); }
    src.connect(gain); gain.connect(oCtx.destination);
    src.start(0, sT, dur);
    const rendered = await oCtx.startRendering();
    const wav = bufferToWav(rendered);
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([wav], {type:'audio/wav'})); a.download = "ringtone.wav"; a.click();
  }

  function bufferToWav(ab) {
    let n = 1, len = ab.length * 2 + 44, buf = new ArrayBuffer(len), view = new DataView(buf), pos = 0;
    const set16 = (d) => { view.setUint16(pos, d, true); pos += 2; }, set32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
    set32(0x46464952); set32(len - 8); set32(0x45564157); set32(0x20746d66); set32(16); set16(1); set16(n);
    set32(ab.sampleRate); set32(ab.sampleRate * 2 * n); set16(n * 2); set16(16); set32(0x61746164); set32(len - pos - 4);
    const data = ab.getChannelData(0);
    for(let i=0; i<ab.length; i++) { let s = Math.max(-1, Math.min(1, data[i])); set16(s < 0 ? s * 0x8000 : s * 0x7FFF); }
    return buf;
  }
</script>
</body>
</html>
