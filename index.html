<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Ringtone Ignition v1.4.2</title>
<style>
  body { background:#121212; color:#eee; font-family:monospace; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0; touch-action:none; }
  .panel { background:#1e1e1e; border:2px solid #333; padding:15px; border-radius:12px; width:90%; text-align:center; box-sizing:border-box; }
  .time { font-size:2.2rem; color:#0ff; font-weight:bold; margin-bottom:5px; text-shadow:0 0 10px #0ff; }
  .info { font-size:0.75rem; color:#f0f; margin-bottom:15px; min-height:1.2em; font-weight:bold; }
  input[type=range] { width:100%; margin:15px 0; accent-color:#0ff; }
  .btns { display:flex; flex-wrap:wrap; justify-content:center; gap:6px; }
  button { background:#333; color:#fff; border:1px solid #555; padding:10px; border-radius:8px; font-weight:bold; flex:1 1 22%; font-size:10px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .accent-in { background:#442244; color:#f0f; border-color:#f0f; }
  .accent-out { background:#224444; color:#0ff; border-color:#0ff; }
  .large-btn { flex:1 1 95%; font-size:14px; height:44px; margin-bottom:2px; }
  .main { background:#006666; color:#fff; border-color:#0ff; flex:1 1 95%; font-size:16px; margin-top:10px; height:50px; }
  .f-btn { background:#333; border:1px solid #555; color:#888; flex: 1 1 30%; }
  .f-btn.active { background:#555; color:#fff; border-color:#fff; }
  #file-in { display:none; }
</style>
</head>
<body onclick="unlockAudio()">
  <div class="panel">
    <button onclick="unlockAudio(); document.getElementById('file-in').click()" style="width:100%; margin-bottom:10px; height:44px; background:#444; color:#0ff; border:1px solid #0ff; font-size:14px;">🎵 SELECT MUSIC</button>
    <div id="tm" class="time">00:00.00</div>
    <div id="rf" class="info">READY</div>
    <input type="range" id="sk" value="0" step="0.01" oninput="manualSeek(this.value)">
    <div class="btns">
      <button onclick="skip(-1)">-1s</button>
      <button onclick="pp()" style="background:#444;">PLAY/STOP</button>
      <button onclick="skip(1)">+1s</button>
      <button class="accent-in" style="flex:1 1 45%" onclick="st('s')">SET START</button>
      <button class="accent-in" onclick="adj('s',-0.1)">IN-0.1</button>
      <button class="accent-in" onclick="adj('s',0.1)">IN+0.1</button>
      <button class="accent-in large-btn" onclick="backToStart()">⏮ STARTへ戻る</button>
      <button class="accent-out" style="flex:1 1 45%" onclick="st('e')">SET END</button>
      <button class="accent-out" onclick="adj('e',-0.1)">OUT-0.1</button>
      <button class="accent-out" onclick="adj('e',0.1)">OUT+0.1</button>
      <button class="accent-out large-btn" onclick="previewEnd()">⏭ END 3秒前再生</button>
      <div style="display:flex; width:100%; gap:5px; margin-top:5px;">
        <button class="f-btn active" id="f0" onclick="setFade(0)">FADE:OFF</button>
        <button class="f-btn" id="f2" onclick="setFade(2)">2s</button>
        <button class="f-btn" id="f5" onclick="setFade(5)">5s</button>
      </div>
      <button id="ig" class="main" onclick="exportAudio()">IGNITION</button>
    </div>
  </div>
  <input type="file" id="file-in" accept=".mp3,.m4a,.wav,.aac,audio/*">

<script>
  let aCtx = new (window.AudioContext || window.webkitAudioContext)();
  let aBuf, sNode;
  let sT = 0, eT = 0, fade = 0, isP = false, pStart = 0, offset = 0;
  const sk = document.getElementById('sk');

  function unlockAudio() { if (aCtx.state === 'suspended') aCtx.resume(); }

  // 完全に音を止める関数
  function stopAudio() {
    if (sNode) {
      try { sNode.stop(); } catch(e){}
      sNode.disconnect();
      sNode = null;
    }
    isP = false;
  }

  document.getElementById('file-in').onchange = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    document.getElementById('rf').innerText = "DECODING...";
    try {
      const arrayBuffer = await file.arrayBuffer();
      aBuf = await aCtx.decodeAudioData(arrayBuffer);
      sk.max = aBuf.duration;
      eT = aBuf.duration;
      offset = 0;
      updateInfo();
    } catch (err) { document.getElementById('rf').innerText = "ERROR: LOAD FAILED"; }
  };

  function pp() {
    if (!aBuf) return;
    unlockAudio();
    if (isP) { 
      stopAudio(); 
    } else {
      stopAudio(); // 念のため、開始前に掃除
      sNode = aCtx.createBufferSource();
      sNode.buffer = aBuf;
      sNode.connect(aCtx.destination);
      if (offset >= eT || offset < 0) offset = sT;
      pStart = aCtx.currentTime;
      sNode.start(0, offset, Math.max(0, eT - offset));
      isP = true;
      const tick = () => {
        if (!isP) return;
        let now = aCtx.currentTime - pStart + offset;
        updateTimeDisplay(now);
        if (now >= eT) { stopAudio(); offset = sT; updateTimeDisplay(sT); } else { requestAnimationFrame(tick); }
      };
      tick();
      sNode.onended = () => { isP = false; };
    }
  }

  function manualSeek(v) {
    let wasP = isP;
    stopAudio();
    offset = parseFloat(v);
    updateTimeDisplay(offset);
    if (wasP) pp();
  }

  function skip(v) { 
    let wasP = isP;
    stopAudio();
    offset = Math.min(aBuf.duration, Math.max(0, offset + v)); 
    updateTimeDisplay(offset);
    if (wasP) pp();
  }

  function adj(t, v) { if(t == 's') sT = Math.max(0, sT + v); else eT = Math.min(aBuf.duration, eT + v); updateInfo(); }
  
  function st(t) { 
    let now = isP ? aCtx.currentTime - pStart + offset : offset; 
    if(t=='s') sT = now; else eT = now; 
    updateInfo(); 
  }

  function backToStart() { 
    stopAudio(); 
    offset = sT; 
    updateTimeDisplay(sT); 
    pp(); // 自動で再生開始
  }

  function previewEnd() { 
    stopAudio(); 
    offset = Math.max(sT, eT - 3); 
    pp(); 
  }
  
  function setFade(v) { 
    fade = v; 
    document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active')); 
    document.getElementById('f'+v).classList.add('active'); 
  }

  function updateInfo() { 
    document.getElementById('rf').innerText = sT.toFixed(2) + " , " + eT.toFixed(2); 
    updateTimeDisplay(isP ? aCtx.currentTime - pStart + offset : offset); 
  }

  function updateTimeDisplay(t) { 
    let m = Math.floor(t/60), s = (t%60).toFixed(2); 
    document.getElementById('tm').innerText = m+":"+s.padStart(5,'0'); 
    sk.value = t; 
  }

  async function exportAudio() {
    if (!aBuf) return;
    const dur = eT - sT;
    const sRate = aBuf.sampleRate;
    const oCtx = new OfflineAudioContext(aBuf.numberOfChannels, Math.floor(dur * sRate), sRate);
    const src = oCtx.createBufferSource(); src.buffer = aBuf;
    const gain = oCtx.createGain();
    gain.gain.setValueAtTime(1, 0);
    if (fade > 0) { gain.gain.setValueAtTime(1, dur - fade); gain.gain.linearRampToValueAtTime(0, dur); }
    src.connect(gain); gain.connect(oCtx.destination);
    src.start(0, sT, dur);
    const rendered = await oCtx.startRendering();
    const wav = bufferToWav(rendered);
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([wav], {type:'audio/wav'})); a.download = "ringtone.wav"; a.click();
  }

  function bufferToWav(ab) {
    let n = ab.numberOfChannels, len = ab.length * n * 2 + 44, buf = new ArrayBuffer(len), view = new DataView(buf), pos = 0;
    const set16 = (d) => { view.setUint16(pos, d, true); pos += 2; }, set32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
    set32(0x46464952); set32(len - 8); set32(0x45564157); set32(0x20746d66); set32(16); set16(1); set16(n);
    set32(ab.sampleRate); set32(ab.sampleRate * 2 * n); set16(n * 2); set16(16); set32(0x61746164); set32(len - pos - 4);
    for(let i=0; i<ab.length; i++) for(let c=0; c<n; c++) { let s = Math.max(-1, Math.min(1, ab.getChannelData(c)[i])); set16(s < 0 ? s * 0x8000 : s * 0x7FFF); }
    return buf;
  }
</script>
</body>
</html>
